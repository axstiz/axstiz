name: Skyline Metrics
on:
  schedule: [{cron: "0 3 * * *"}]
  workflow_dispatch:
  push: {branches: [main]}

permissions:
  contents: write

jobs:
  skyline:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: skyline.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: 2026
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.5
